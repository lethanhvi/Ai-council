<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Council</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07080b">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080b;
  --surface: #0f1115;
  --surface2: #1a1d24;
  --border: #1e2128;
  --text: #e8eaf0;
  --muted: #565b6e;
  --green: #00e5a0;
  --red: #ff3d5a;
  --amber: #ffb547;
  --blue: #4d9fff;
  --pink: #ff6eb4;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(12px + var(--safe-top)) 16px 12px;
  border-bottom: 1px solid var(--border);
  background: #09090d;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, rgba(0,229,160,0.2), rgba(77,159,255,0.1));
  border: 1px solid rgba(0,229,160,0.3);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.logo-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 3px;
  background: linear-gradient(90deg, #e8eaf0, #00e5a0);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.logo-sub {
  font-family: 'Space Mono', monospace;
  font-size: 8px; color: var(--muted); letter-spacing: 2px;
}

.header-right {
  display: flex; align-items: center; gap: 8px;
}

.status-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,229,160,0.08);
  border: 1px solid rgba(0,229,160,0.2);
  border-radius: 6px; padding: 5px 10px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}

.status-dot.thinking {
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber);
  animation: pulse 1s ease infinite;
}

.status-text {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 1px; color: var(--green);
}
.status-text.thinking { color: var(--amber); }

.end-btn {
  background: rgba(255,61,90,0.1);
  border: 1px solid rgba(255,61,90,0.3);
  border-radius: 6px; padding: 5px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--red); letter-spacing: 1px;
  cursor: pointer;
}

/* AGENTS BAR */
.agents-bar {
  display: flex; gap: 8px; padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: #0a0b0e;
  overflow-x: auto; flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}

.agents-bar::-webkit-scrollbar { display: none; }

.agent-chip {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 12px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0; cursor: pointer;
  transition: all 0.2s;
  position: relative; overflow: hidden;
}

.agent-chip.inactive { opacity: 0.35; }

.agent-chip-emoji { font-size: 15px; }

.agent-chip-name {
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
}

.agent-chip-role {
  font-family: 'Space Mono', monospace;
  font-size: 7px; color: var(--muted); letter-spacing: 0.5px;
}

.agent-chip .typing-dots {
  display: none; gap: 2px; align-items: center;
}

.agent-chip.is-typing .typing-dots { display: flex; }

.typing-dots span {
  width: 3px; height: 3px; border-radius: 50%;
  display: block;
  animation: bounce 0.6s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

/* MAIN */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* LOBBY */
.lobby {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px; gap: 28px;
  animation: fadeDown 0.5s ease both;
}

.lobby-title {
  text-align: center;
}

.lobby-title h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(42px, 10vw, 64px);
  letter-spacing: 4px; line-height: 1;
  background: linear-gradient(135deg, #e8eaf0 30%, #00e5a0 70%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.lobby-title p {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted); letter-spacing: 2px;
}

.quick-topics { width: 100%; max-width: 500px; }

.quick-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--muted); letter-spacing: 2px;
  margin-bottom: 10px; text-align: center;
}

.topic-btn {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 16px;
  color: #8a9ab0; font-size: 13px;
  text-align: left; line-height: 1.5;
  margin-bottom: 8px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}

.topic-btn:active { background: #131720; color: var(--text); }
.topic-btn .arrow { color: var(--green); opacity: 0.6; font-size: 12px; flex-shrink: 0; }

.custom-input-wrap {
  width: 100%; max-width: 500px;
}

.custom-row {
  display: flex; gap: 10px;
}

.custom-input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
  color: var(--text); font-size: 13px;
  font-family: 'DM Sans', sans-serif;
}

.custom-input:focus { outline: none; border-color: rgba(0,229,160,0.4); }

.open-btn {
  background: linear-gradient(135deg, rgba(0,229,160,0.2), rgba(0,229,160,0.1));
  border: 1px solid rgba(0,229,160,0.4);
  border-radius: 8px; padding: 12px 18px;
  color: var(--green);
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 1px; cursor: pointer;
  white-space: nowrap;
}

/* MEETING */
.meeting { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topic-bar {
  padding: 8px 16px;
  background: rgba(0,229,160,0.04);
  border-bottom: 1px solid rgba(0,229,160,0.1);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}

.topic-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: rgba(0,229,160,0.5); letter-spacing: 1px; white-space: nowrap;
}

.topic-text { font-size: 12px; color: #8ab8a0; flex: 1; }

/* CHAT */
.chat {
  flex: 1; overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
}

.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb { background: #252830; border-radius: 2px; }

/* MESSAGES */
.msg-wrap {
  margin-bottom: 14px;
  animation: slideInLeft 0.3s ease both;
}

.msg-wrap.user-msg {
  display: flex; justify-content: flex-end;
  animation: slideInRight 0.3s ease both;
}

.user-bubble {
  background: linear-gradient(135deg, #1a2a1a, #152515);
  border: 1px solid rgba(0,229,160,0.3);
  border-radius: 12px 0 12px 12px;
  padding: 11px 14px;
  max-width: 75%;
  font-size: 13.5px;
  color: #d4f0e0;
  line-height: 1.6;
}

.ai-row {
  display: flex; align-items: flex-start; gap: 9px;
}

.ai-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
  box-shadow: 0 0 10px var(--agent-glow, transparent);
}

.ai-content { flex: 1; }

.ai-meta {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}

.ai-name {
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
}

.ai-role {
  font-family: 'Space Mono', monospace;
  font-size: 8px; color: var(--muted);
}

.ai-bubble {
  background: #0f1115;
  border-radius: 0 12px 12px 12px;
  padding: 11px 14px;
  font-size: 13.5px; color: #c5c9d6;
  line-height: 1.7; max-width: 88%;
  position: relative; overflow: hidden;
}

.ai-bubble::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--agent-color, #fff) 40%, transparent);
  opacity: 0.4;
}

/* TYPING */
.typing-wrap {
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 9px;
  opacity: 0.8;
}

.typing-bubble {
  background: var(--surface);
  border-radius: 0 12px 12px 12px;
  padding: 11px 16px;
  display: flex; gap: 5px; align-items: center;
}

.typing-bubble span {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: block;
  animation: bounce 1s ease-in-out infinite;
}

.typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

/* INPUT */
.input-area {
  border-top: 1px solid var(--border);
  padding: 12px 16px calc(12px + var(--safe-bottom));
  background: #09090d; flex-shrink: 0;
  display: flex; gap: 10px; align-items: flex-end;
}

.chat-input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px;
  color: var(--text); font-size: 13px; resize: none;
  font-family: 'DM Sans', sans-serif; line-height: 1.6;
  max-height: 100px;
}

.chat-input:focus { outline: none; border-color: rgba(0,229,160,0.3); }
.chat-input:disabled { opacity: 0.4; }

.send-btn {
  width: 42px; height: 42px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all 0.2s;
}

.send-btn.active {
  background: linear-gradient(135deg, rgba(0,229,160,0.2), rgba(0,229,160,0.08));
  border-color: rgba(0,229,160,0.4); color: var(--green);
}

/* ANIMATIONS */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-16px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(16px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🏛️</div>
    <div>
      <div class="logo-title">AI COUNCIL</div>
      <div class="logo-sub">VIRTUAL MEETING ROOM</div>
    </div>
  </div>
  <div class="header-right" id="header-right" style="display:none">
    <div class="status-badge">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">ONLINE</span>
    </div>
    <button class="end-btn" onclick="endMeeting()">✕ KẾT THÚC</button>
  </div>
</div>

<!-- AGENTS BAR -->
<div class="agents-bar" id="agents-bar"></div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- LOBBY -->
  <div class="lobby" id="lobby">
    <div class="lobby-title">
      <h2>MỞ PHÒNG HỌP</h2>
      <p>ĐẶT VẤN ĐỀ — ĐỂ AI THẢO LUẬN</p>
    </div>

    <div class="quick-topics">
      <div class="quick-label">GỢI Ý NHANH</div>
      <button class="topic-btn" onclick="startMeeting('Nên ra mắt tính năng mới hay tập trung fix bug?')">
        <span class="arrow">→</span> Nên ra mắt tính năng mới hay tập trung fix bug?
      </button>
      <button class="topic-btn" onclick="startMeeting('Có nên mở rộng sang thị trường nước ngoài không?')">
        <span class="arrow">→</span> Có nên mở rộng sang thị trường nước ngoài không?
      </button>
      <button class="topic-btn" onclick="startMeeting('Tăng giá sản phẩm 20% có hợp lý không?')">
        <span class="arrow">→</span> Tăng giá sản phẩm 20% có hợp lý không?
      </button>
      <button class="topic-btn" onclick="startMeeting('Nên thuê thêm người hay outsource?')">
        <span class="arrow">→</span> Nên thuê thêm người hay outsource?
      </button>
    </div>

    <div class="custom-input-wrap">
      <div class="quick-label" style="margin-bottom:10px">HOẶC NHẬP CHỦ ĐỀ RIÊNG</div>
      <div class="custom-row">
        <input class="custom-input" id="custom-topic" placeholder="Nhập câu hỏi hoặc vấn đề..." />
        <button class="open-btn" onclick="startFromInput()">MỞ HỌP</button>
      </div>
    </div>
  </div>

  <!-- MEETING -->
  <div class="meeting" id="meeting" style="display:none">
    <div class="topic-bar">
      <span class="topic-label">CHỦ ĐỀ</span>
      <span class="topic-text" id="topic-display"></span>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area">
      <textarea class="chat-input" id="chat-input" rows="2"
        placeholder="Tiếp tục thảo luận... (gửi)"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>

</div>

<script>
// ── AGENTS ────────────────────────────────────────────
const AGENTS = [
  {
    id: 'ceo', name: 'Minh', role: 'CEO', emoji: '👔',
    color: '#c8a96e', glow: 'rgba(200,169,110,0.18)', border: 'rgba(200,169,110,0.4)',
    system: `Bạn là Minh — CEO. Thực dụng, quyết đoán, luôn nhìn vào ROI và khả năng thực thi.
Nói ngắn gọn, thẳng thắn. Hay hỏi "Số liệu đâu?" và "Deadline là khi nào?".
Trả lời tiếng Việt, tối đa 3-4 câu. Thỉnh thoảng phản bác ý kiến người trước.`
  },
  {
    id: 'dev', name: 'Nam', role: 'Lead Dev', emoji: '💻',
    color: '#4d9fff', glow: 'rgba(77,159,255,0.18)', border: 'rgba(77,159,255,0.4)',
    system: `Bạn là Nam — Lead Developer. Hay phản biện, tư duy hệ thống, luôn nghĩ đến technical debt.
Thường nói "Về mặt kỹ thuật thì...", hay cảnh báo rủi ro.
Trả lời tiếng Việt, tối đa 3-4 câu. Phản hồi dựa trên những gì người khác đã nói.`
  },
  {
    id: 'cmo', name: 'Lan', role: 'CMO', emoji: '📣',
    color: '#ff6eb4', glow: 'rgba(255,110,180,0.18)', border: 'rgba(255,110,180,0.4)',
    system: `Bạn là Lan — CMO. Lạc quan, sáng tạo, luôn nghĩ đến user experience và viral potential.
Hay dùng từ "opportunity", "brand story". Đôi khi hơi quá nhiệt tình.
Trả lời tiếng Việt, tối đa 3-4 câu. Tìm điểm tích cực và bổ sung góc nhìn marketing.`
  },
  {
    id: 'analyst', name: 'Hùng', role: 'Analyst', emoji: '📊',
    color: '#00e5a0', glow: 'rgba(0,229,160,0.18)', border: 'rgba(0,229,160,0.4)',
    system: `Bạn là Hùng — Business Analyst. Cẩn thận, trung lập, luôn dựa trên data.
Thường nói "Theo số liệu...", "Nếu so với...", hay đưa ra 2-3 kịch bản.
Trả lời tiếng Việt, tối đa 3-4 câu. Tóm tắt và phân tích những gì đã thảo luận.`
  }
];

// ── STATE ─────────────────────────────────────────────
let activeAgents = AGENTS.map(a => a.id);
let messages = []; // {role, content, agentId}
let isRunning = false;
let currentTopic = '';

// ── RENDER AGENTS BAR ─────────────────────────────────
function renderAgentsBar() {
  const bar = document.getElementById('agents-bar');
  bar.innerHTML = '';
  AGENTS.forEach(agent => {
    const isActive = activeAgents.includes(agent.id);
    const chip = document.createElement('div');
    chip.className = 'agent-chip' + (isActive ? '' : ' inactive');
    chip.id = 'chip-' + agent.id;
    chip.style.cssText = `
      background: ${isActive ? agent.glow : 'var(--surface)'};
      border-color: ${isActive ? agent.border : 'var(--border)'};
    `;
    chip.innerHTML = `
      <span class="agent-chip-emoji">${agent.emoji}</span>
      <div>
        <div class="agent-chip-name" style="color:${agent.color}">${agent.name}</div>
        <div class="agent-chip-role">${agent.role}</div>
      </div>
      <div class="typing-dots">
        <span style="background:${agent.color}"></span>
        <span style="background:${agent.color}"></span>
        <span style="background:${agent.color}"></span>
      </div>
    `;
    chip.onclick = () => toggleAgent(agent.id);
    bar.appendChild(chip);
  });
}

function toggleAgent(id) {
  if (isRunning) return;
  if (activeAgents.includes(id)) {
    if (activeAgents.length <= 1) return;
    activeAgents = activeAgents.filter(a => a !== id);
  } else {
    activeAgents.push(id);
  }
  renderAgentsBar();
}

function setChipTyping(agentId, typing) {
  const chip = document.getElementById('chip-' + agentId);
  if (!chip) return;
  if (typing) chip.classList.add('is-typing');
  else chip.classList.remove('is-typing');
}

// ── MEETING FLOW ──────────────────────────────────────
function startFromInput() {
  const val = document.getElementById('custom-topic').value.trim();
  if (val) startMeeting(val);
}

async function startMeeting(topic) {
  currentTopic = topic;
  messages = [];

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('meeting').style.display = 'flex';
  document.getElementById('header-right').style.display = 'flex';
  document.getElementById('topic-display').textContent = topic;
  document.getElementById('chat').innerHTML = '';

  addUserMessage(topic);
  await runAgents(topic);
}

function endMeeting() {
  messages = [];
  isRunning = false;
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('meeting').style.display = 'none';
  document.getElementById('header-right').style.display = 'none';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('custom-topic').value = '';
  setStatus(false);
  AGENTS.forEach(a => setChipTyping(a.id, false));
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || isRunning) return;
  input.value = '';
  autoResize(input);
  updateSendBtn();

  addUserMessage(msg);
  await runAgents(msg);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  updateSendBtn();
}

function updateSendBtn() {
  const val = document.getElementById('chat-input').value.trim();
  const btn = document.getElementById('send-btn');
  btn.className = 'send-btn' + (val && !isRunning ? ' active' : '');
}

// ── AI RUNNER ─────────────────────────────────────────
async function runAgents(userMsg) {
  isRunning = true;
  setStatus(true);
  document.getElementById('chat-input').disabled = true;
  updateSendBtn();

  const selected = AGENTS.filter(a => activeAgents.includes(a.id));

  // Build conversation so far (before this user msg) as context string
  for (const agent of selected) {
    setChipTyping(agent.id, true);
    showTypingIndicator(agent);
    await sleep(700 + Math.random() * 500);

    // Build messages array for this agent
    const apiMessages = buildApiMessages(agent, userMsg);

    try {
      const reply = await callClaude(agent.system, apiMessages);
      hideTypingIndicator();
      setChipTyping(agent.id, false);
      addAiMessage(agent, reply);
      // add to local history as assistant turn
      messages.push({ role: 'assistant', agentId: agent.id, content: `[${agent.name}]: ${reply}` });
      await sleep(300);
    } catch (err) {
      hideTypingIndicator();
      setChipTyping(agent.id, false);
      addAiMessage(agent, '⚠️ Lỗi kết nối API. Vui lòng thử lại.');
    }
  }

  isRunning = false;
  setStatus(false);
  document.getElementById('chat-input').disabled = false;
  document.getElementById('chat-input').focus();
  updateSendBtn();
}

function buildApiMessages(agent, latestUserMsg) {
  // Flatten previous messages into alternating user/assistant
  const result = [];
  let lastRole = null;

  messages.forEach(m => {
    if (m.role === 'user') {
      if (lastRole === 'user') {
        // merge
        result[result.length - 1].content += '\n' + m.content;
      } else {
        result.push({ role: 'user', content: m.content });
      }
      lastRole = 'user';
    } else {
      // assistant turns — group into user turn for context
      if (lastRole === 'assistant') {
        result[result.length - 1].content += '\n' + m.content;
      } else {
        result.push({ role: 'assistant', content: m.content });
      }
      lastRole = 'assistant';
    }
  });

  // Ensure last message before the new user msg is assistant (to allow user turn)
  // Just append the new user message
  const contextNote = `Chủ đề cuộc họp: "${currentTopic}". Bạn là ${agent.name} (${agent.role}). Đừng lặp lại người trước. Hãy bổ sung góc nhìn mới.`;

  if (result.length === 0 || result[result.length - 1].role === 'assistant') {
    result.push({ role: 'user', content: contextNote + '\n\nNgười dùng nói: ' + latestUserMsg });
  } else {
    // last is user, add assistant placeholder then new user
    result.push({ role: 'assistant', content: 'Tôi hiểu.' });
    result.push({ role: 'user', content: contextNote + '\n\nNgười dùng nói: ' + latestUserMsg });
  }

  return result;
}

async function callClaude(systemPrompt, msgs) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: msgs
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || '...';
}

// ── DOM HELPERS ───────────────────────────────────────
function addUserMessage(text) {
  messages.push({ role: 'user', content: text });
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user-msg';
  wrap.innerHTML = `<div class="user-bubble">${escHtml(text)}</div>`;
  chat.appendChild(wrap);
  scrollChat();
}

function addAiMessage(agent, text) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.innerHTML = `
    <div class="ai-row">
      <div class="ai-avatar" style="background:${agent.glow};border:1px solid ${agent.border};--agent-glow:${agent.glow}">
        ${agent.emoji}
      </div>
      <div class="ai-content">
        <div class="ai-meta">
          <span class="ai-name" style="color:${agent.color}">${agent.name.toUpperCase()}</span>
          <span class="ai-role">// ${agent.role}</span>
        </div>
        <div class="ai-bubble" style="border:1px solid ${agent.border};box-shadow:0 0 16px ${agent.glow};--agent-color:${agent.color}">
          ${escHtml(text)}
        </div>
      </div>
    </div>
  `;
  chat.appendChild(wrap);
  scrollChat();
}

let typingEl = null;
function showTypingIndicator(agent) {
  hideTypingIndicator();
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = `
    <div class="ai-avatar" style="background:${agent.glow};border:1px solid ${agent.border};font-size:15px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      ${agent.emoji}
    </div>
    <div class="typing-bubble" style="border:1px solid ${agent.border}">
      <span style="background:${agent.color}"></span>
      <span style="background:${agent.color}"></span>
      <span style="background:${agent.color}"></span>
    </div>
  `;
  chat.appendChild(typingEl);
  scrollChat();
}

function hideTypingIndicator() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function scrollChat() {
  const chat = document.getElementById('chat');
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

function setStatus(thinking) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (thinking) {
    dot.className = 'status-dot thinking';
    txt.className = 'status-text thinking';
    txt.textContent = 'ĐANG HỌP';
  } else {
    dot.className = 'status-dot';
    txt.className = 'status-text';
    txt.textContent = 'ONLINE';
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── INIT ──────────────────────────────────────────────
renderAgentsBar();
document.getElementById('custom-topic').addEventListener('keydown', e => {
  if (e.key === 'Enter') startFromInput();
});
document.getElementById('chat-input').addEventListener('input', updateSendBtn);
</script>
